yamlname: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against (defaults to the branch you dispatch from)'
        required: false
        default: ''

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artpulse_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artpulse_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_e2e?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_e2e?schema=public
      AUTH_SECRET: ci-e2e-auth-secret
      NEXTAUTH_SECRET: ci-e2e-auth-secret
      NEXTAUTH_URL: http://localhost:3000
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: password123
      CRON_SECRET: ci-dummy-cron-secret
      PERF_EXPLAIN_ENABLED: false
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      SEED_ENABLED: "true"
      CI: "true"
      PLAYWRIGHT: "true"
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Run safe Prisma deploy
        timeout-minutes: 10
        run: pnpm prisma:safe-deploy

      - name: Seed database
        timeout-minutes: 5
        run: pnpm db:seed

      - name: Build app
        timeout-minutes: 15
        run: pnpm build

      - name: Install Playwright browser
        timeout-minutes: 10
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        timeout-minutes: 15
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 7
