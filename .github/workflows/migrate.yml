name: Prisma Migrate (Neon)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      NEON_BRANCH_NAME: main
      AUTH_SECRET: ci-migrate-auth-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Fetch Neon connection URLs
        id: neon
        run: |
          max_attempts=24
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Fetching Neon connection URLs attempt ${attempt}/${max_attempts}..."

            set +e
            neon_err_log="$(mktemp)"
            node scripts/neon/get-connection-urls.mjs --branch-name "$NEON_BRANCH_NAME" 2>"$neon_err_log"
            status=$?
            set -e

            if [ "$status" -ne 0 ]; then
              fail_reason="$(sed -n 's/.*FAIL_REASON=\([^ ]*\).*/\1/p' "$neon_err_log" | tail -n1)"
              echo "Neon URL fetch FAIL_REASON=${fail_reason:-UNKNOWN}"
              cat "$neon_err_log" >&2
            fi
            rm -f "$neon_err_log"

            if [ "$status" -eq 0 ]; then
              if grep -q '^database_url=' "$GITHUB_OUTPUT" && grep -q '^direct_url=' "$GITHUB_OUTPUT"; then
                echo "Connection URLs retrieved successfully."
                exit 0
              fi
              echo "get-connection-urls succeeded but required outputs were not set yet."
            elif [ "$status" -eq 2 ]; then
              exit 2
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Connection URLs not ready yet; retrying in 5s..."
              sleep 5
            fi
          done

          echo "Failed to fetch Neon connection URLs (database_url/direct_url) after ${max_attempts} attempts."
          exit 1

      - name: Normalize DB URLs (sslmode=require)
        id: normalize-urls
        env:
          RAW_DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          RAW_DIRECT_URL: ${{ steps.neon.outputs.direct_url }}
        run: |
          node -e "const db = new URL(process.env.RAW_DATABASE_URL); db.searchParams.set('sslmode','require'); const direct = new URL(process.env.RAW_DIRECT_URL); direct.searchParams.set('sslmode','require'); console.log('database_url=' + db.toString()); console.log('direct_url=' + direct.toString());" >> "$GITHUB_OUTPUT"

      - name: Print Prisma version
        run: pnpm prisma --version

      - name: Validate DB URL hosts
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "process.exit(new URL(process.env.DIRECT_URL).hostname.includes('-pooler') ? 1 : 0)"
          node -e "const db = new URL(process.env.DATABASE_URL); const d = new URL(process.env.DIRECT_URL); process.exit((db.searchParams.get('sslmode') === 'require' && d.searchParams.get('sslmode') === 'require') ? 0 : 1)"

      - name: Check migration FK ordering
        run: pnpm prisma:check-migration-order

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Migrate deploy
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma:safe-deploy

      - name: Check migration status after deploy
        timeout-minutes: 5
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma migrate status

      - name: Build app
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
          NEXTAUTH_URL: http://127.0.0.1:3000
          CRON_SECRET: ci-migrate-cron-secret
        run: pnpm build

      - name: Verify tables exist
        env:
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: |
          pnpm prisma db execute --url "$DIRECT_URL" --stdin <<'SQL'
          select to_regclass('public._prisma_migrations') as prisma_migrations_table;
          select table_schema, table_name
          from information_schema.tables
          where table_schema='public'
          order by table_name;
          SQL
