name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artpulse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artpulse_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-dummy-auth-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-dummy-cron-secret
      PERF_EXPLAIN_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Run safe Prisma deploy
        timeout-minutes: 10
        run: pnpm prisma:safe-deploy

      - name: Verify migration status
        timeout-minutes: 5
        run: pnpm prisma migrate status

      - name: Build app
        timeout-minutes: 10
        run: pnpm build

      - name: Print Prisma version
        run: pnpm prisma --version

      - name: Validate DB URL hosts
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "process.exit(new URL(process.env.DIRECT_URL).hostname.includes('-pooler') ? 1 : 0)"

      - name: Assert CI DB is non-production
        run: |
          node -e "const host = new URL(process.env.DATABASE_URL).hostname; if (host !== '127.0.0.1' && host !== 'localhost') process.exit(1); console.log('CI database host validated:', host);"

      - name: Check migration FK ordering
        run: pnpm prisma:check-migration-order

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check production env contract
        run: pnpm check-env

  e2e:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artpulse_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artpulse_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_e2e?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_e2e?schema=public
      AUTH_SECRET: ci-e2e-auth-secret
      NEXTAUTH_SECRET: ci-e2e-auth-secret
      NEXTAUTH_URL: http://localhost:3000
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: password123
      CRON_SECRET: ci-dummy-cron-secret
      PERF_EXPLAIN_ENABLED: false
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      SEED_ENABLED: "true"
      CI: "true"
      PLAYWRIGHT: "true"
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Run safe Prisma deploy
        timeout-minutes: 10
        run: pnpm prisma:safe-deploy

      - name: Seed database
        timeout-minutes: 5
        run: pnpm db:seed

      - name: Build app
        timeout-minutes: 15
        run: pnpm build

      - name: Install Playwright browser
        timeout-minutes: 10
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        timeout-minutes: 15
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 3
