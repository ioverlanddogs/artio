name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artpulse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artpulse_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-dummy-auth-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-dummy-cron-secret
      PERF_EXPLAIN_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Prisma version
        run: pnpm prisma --version

      - name: Validate DB URL hosts
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "process.exit(new URL(process.env.DIRECT_URL).hostname.includes('-pooler') ? 1 : 0)"

      - name: Check migration FK ordering
        run: pnpm prisma:check-migration-order

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Verify migrate deploy on clean Postgres
        run: pnpm prisma:safe-deploy

      - name: Check migration status after deploy
        run: pnpm prisma migrate status

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check production env contract
        run: pnpm check-env

      - name: Build
        run: pnpm build
