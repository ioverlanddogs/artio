name: Staging DB (Neon)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  staging-db:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      STAGING_BRANCH_NAME: staging
      STAGING_PARENT_BRANCH: main
      AUTH_SECRET: ci-staging-auth-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Ensure staging Neon branch exists
        run: node scripts/neon/create-branch.mjs --branch-name "$STAGING_BRANCH_NAME" --parent-branch "$STAGING_PARENT_BRANCH"

      - name: Fetch staging DB connection URLs
        id: neon-urls
        run: |
          max_attempts=24
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Fetching Neon connection URLs attempt ${attempt}/${max_attempts}..."

            set +e
            neon_err_log="$(mktemp)"
            node scripts/neon/get-connection-urls.mjs --branch-name "$STAGING_BRANCH_NAME" 2>"$neon_err_log"
            status=$?
            set -e

            if [ "$status" -ne 0 ]; then
              fail_reason="$(sed -n 's/.*FAIL_REASON=\([^ ]*\).*/\1/p' "$neon_err_log" | tail -n1)"
              echo "Neon URL fetch FAIL_REASON=${fail_reason:-UNKNOWN}"
              cat "$neon_err_log" >&2
            fi
            rm -f "$neon_err_log"

            if [ "$status" -eq 0 ]; then
              if grep -q '^database_url=' "$GITHUB_OUTPUT" && grep -q '^direct_url=' "$GITHUB_OUTPUT"; then
                echo "Connection URLs retrieved successfully."
                exit 0
              fi
              echo "get-connection-urls succeeded but required outputs were not set yet."
            elif [ "$status" -eq 2 ]; then
              exit 2
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Connection URLs not ready yet; retrying in 5s..."
              sleep 5
            fi
          done

          echo "Failed to fetch Neon connection URLs (database_url/direct_url) after ${max_attempts} attempts."
          exit 1

      - name: Normalize staging DB URLs (sslmode=require)
        id: normalize-urls
        env:
          RAW_DATABASE_URL: ${{ steps.neon-urls.outputs.database_url }}
          RAW_DIRECT_URL: ${{ steps.neon-urls.outputs.direct_url }}
        run: |
          node -e "const db = new URL(process.env.RAW_DATABASE_URL); db.searchParams.set('sslmode','require'); const direct = new URL(process.env.RAW_DIRECT_URL); direct.searchParams.set('sslmode','require'); console.log('database_url=' + db.toString()); console.log('direct_url=' + direct.toString());" >> "$GITHUB_OUTPUT"

      - name: Print Prisma version
        run: pnpm prisma --version

      - name: Validate staging DB URL hosts
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "const u = new URL(process.env.DIRECT_URL); process.exit(u.hostname.includes('-pooler') ? 1 : 0)"
          node -e "const db = new URL(process.env.DATABASE_URL); const d = new URL(process.env.DIRECT_URL); process.exit((db.searchParams.get('sslmode') === 'require' && d.searchParams.get('sslmode') === 'require') ? 0 : 1)"

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Deploy migrations to staging DB
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma:safe-deploy

      - name: Check migration status after deploy
        timeout-minutes: 5
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma migrate status

      - name: Build app
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
          NEXTAUTH_URL: http://127.0.0.1:3000
          CRON_SECRET: ci-staging-cron-secret
        run: pnpm vercel:build

      - name: Seed staging DB (optional)
        if: ${{ vars.STAGING_SEED_ENABLED == 'true' }}
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
          SEED_ENABLED: "true"
          APP_ENV: staging
        run: pnpm db:seed
