name: Cleanup Preview DB (Neon)

on:
  pull_request:
    types: [closed]

jobs:
  cleanup_preview_branch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      PR_BRANCH_NAME: pr-${{ github.event.pull_request.number }}
      PARENT_NEON_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check Vercel secrets
        id: vercel_secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && \
             [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && \
             [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_vercel_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets not configured — skipping Vercel steps."
          fi

      - name: Skip when Neon secrets are unavailable
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "NEON_API_KEY or NEON_PROJECT_ID is missing; skipping preview branch deletion."
            exit 0
          fi

      - name: Delete preview Neon branch
        run: node scripts/neon/delete-branch.mjs --branch-name "$PR_BRANCH_NAME" --parent-branch "$PARENT_NEON_BRANCH"

      - name: Remove Vercel Preview env vars for this git branch
        if: ${{ steps.vercel_secrets.outputs.has_vercel_secrets == 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PR_GIT_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # Hard guard — exit cleanly if secrets are not configured.
          if [ -z "$VERCEL_TOKEN" ] || \
             [ -z "$VERCEL_ORG_ID" ] || \
             [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not set — skipping env var cleanup."
            exit 0
          fi

          VERCEL_ENV_LIST_URL="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?gitBranch=$PR_GIT_BRANCH&teamId=$VERCEL_ORG_ID"

          for ENV_KEY in DATABASE_URL DIRECT_URL; do
            VERCEL_ENV_RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$VERCEL_ENV_LIST_URL" 2>/dev/null || echo "{}")
            ENV_ID=$(echo "$VERCEL_ENV_RESPONSE" \
              | jq -r --arg key "$ENV_KEY" '.envs[] | select(.key == $key and .gitBranch == env.PR_GIT_BRANCH) | .id' 2>/dev/null || echo "")

            if [ -n "$ENV_ID" ]; then
              curl -sf -X DELETE \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID?teamId=$VERCEL_ORG_ID" > /dev/null
            fi
          done

          echo "cleanup-env OK: Vercel preview env vars removed for branch $PR_GIT_BRANCH"

      - name: Skip Vercel cleanup (missing secrets)
        if: ${{ steps.vercel_secrets.outputs.has_vercel_secrets != 'true' }}
        run: echo "Skipping Vercel env cleanup because Vercel secrets are not available."
