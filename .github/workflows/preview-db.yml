name: Preview DB (Neon)

concurrency:
  group: preview-db-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  migrate_preview_db:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      PR_BRANCH_NAME: pr-${{ github.event.pull_request.number }}
      PARENT_NEON_BRANCH: main
      AUTH_SECRET: ci-preview-auth-secret
    outputs:
      database_url: ${{ steps.normalize-urls.outputs.database_url }}
      direct_url: ${{ steps.normalize-urls.outputs.direct_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel_secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && \
             [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && \
             [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_vercel_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets not configured — skipping Vercel steps."
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Check Neon secrets
        id: neon_secrets
        shell: bash
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "has_neon_secrets=false" >> "$GITHUB_OUTPUT"
            echo "NEON_API_KEY or NEON_PROJECT_ID is missing; skipping preview DB workflow."
            exit 0
          fi

          echo "has_neon_secrets=true" >> "$GITHUB_OUTPUT"

      - name: Ensure preview Neon branch exists
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        run: node scripts/neon/create-branch.mjs --branch-name "$PR_BRANCH_NAME" --parent-branch "$PARENT_NEON_BRANCH"

      - name: Wait until preview Neon branch is visible
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        run: |
          max_attempts=20
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Checking Neon branch visibility attempt ${attempt}/${max_attempts}..."

            if node --input-type=module -e 'import { getBranchByName } from "./scripts/neon/_neon-api.mjs"; const b=await getBranchByName({ projectId: process.env.NEON_PROJECT_ID, apiKey: process.env.NEON_API_KEY, branchName: process.env.PR_BRANCH_NAME }); if (!b) process.exit(1);'; then
              echo "Branch is visible in Neon API."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep 3
            fi
          done

          echo "Neon branch was not visible after ${max_attempts} attempts."
          exit 1

      - name: Fetch preview DB connection URLs
        id: neon-urls
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        run: |
          max_attempts=24
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Fetching Neon connection URLs attempt ${attempt}/${max_attempts}..."

            set +e
            neon_err_log="$(mktemp)"
            node scripts/neon/get-connection-urls.mjs --branch-name "$PR_BRANCH_NAME" 2>"$neon_err_log"
            status=$?
            set -e

            if [ "$status" -ne 0 ]; then
              fail_reason="$(sed -n 's/.*FAIL_REASON=\([^ ]*\).*/\1/p' "$neon_err_log" | tail -n1)"
              echo "Neon URL fetch FAIL_REASON=${fail_reason:-UNKNOWN}"
              cat "$neon_err_log" >&2
            fi
            rm -f "$neon_err_log"

            if [ "$status" -eq 0 ]; then
              if grep -q '^database_url=' "$GITHUB_OUTPUT" && grep -q '^direct_url=' "$GITHUB_OUTPUT"; then
                echo "Connection URLs retrieved successfully."
                exit 0
              fi
              echo "get-connection-urls succeeded but required outputs were not set yet."
            elif [ "$status" -eq 2 ]; then
              exit 2
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Connection URLs not ready yet; retrying in 5s..."
              sleep 5
            fi
          done

          echo "Failed to fetch Neon connection URLs (database_url/direct_url) after ${max_attempts} attempts."
          exit 1

      - name: Normalize preview DB URLs (sslmode=require)
        id: normalize-urls
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        env:
          RAW_DATABASE_URL: ${{ steps.neon-urls.outputs.database_url }}
          RAW_DIRECT_URL: ${{ steps.neon-urls.outputs.direct_url }}
        run: |
          node -e "const db = new URL(process.env.RAW_DATABASE_URL); db.searchParams.set('sslmode','require'); const direct = new URL(process.env.RAW_DIRECT_URL); direct.searchParams.set('sslmode','require'); console.log('database_url=' + db.toString()); console.log('direct_url=' + direct.toString());" >> "$GITHUB_OUTPUT"

      - name: Print Prisma version
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        run: pnpm prisma --version

      - name: Validate preview DB URL hosts
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "const u = new URL(process.env.DIRECT_URL); process.exit(u.hostname.includes('-pooler') ? 1 : 0)"
          node -e "const db = new URL(process.env.DATABASE_URL); const d = new URL(process.env.DIRECT_URL); process.exit((db.searchParams.get('sslmode') === 'require' && d.searchParams.get('sslmode') === 'require') ? 0 : 1)"

      - name: Generate Prisma Client
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Deploy migrations to preview DB
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma:safe-deploy

      - name: Check migration status after deploy
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        timeout-minutes: 5
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: pnpm prisma migrate status

      - name: Build app
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        timeout-minutes: 12
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
          NEXTAUTH_URL: http://127.0.0.1:3000
          CRON_SECRET: ci-preview-cron-secret
        run: pnpm vercel:build

      - name: Seed preview DB
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' }}
        env:
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
          SEED_ENABLED: "true"
          APP_ENV: preview
        run: pnpm db:seed

      - name: Update Vercel Preview env vars for this git branch
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' && steps.vercel_secrets.outputs.has_vercel_secrets == 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PR_GIT_BRANCH: ${{ github.head_ref }}
          DATABASE_URL: ${{ steps.normalize-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize-urls.outputs.direct_url }}
        run: |
          # Hard guard — exit cleanly if secrets are not configured.
          if [ -z "$VERCEL_TOKEN" ] || \
             [ -z "$VERCEL_ORG_ID" ] || \
             [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not set — skipping env var sync."
            exit 0
          fi

          VERCEL_ENV_LIST_URL="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?gitBranch=$PR_GIT_BRANCH&teamId=$VERCEL_ORG_ID"
          VERCEL_ENV_CREATE_URL="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID"

          VERCEL_ENV_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "$VERCEL_ENV_LIST_URL" 2>/dev/null || echo "{}")
          ENV_ID=$(echo "$VERCEL_ENV_RESPONSE" \
            | jq -r '.envs[] | select(.key == "DATABASE_URL" and .gitBranch == env.PR_GIT_BRANCH) | .id' 2>/dev/null || echo "")
          if [ -n "$ENV_ID" ]; then
            curl -sf -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID?teamId=$VERCEL_ORG_ID" > /dev/null
          fi

          curl -sf -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"DATABASE_URL\",\"value\":\"$DATABASE_URL\",\"type\":\"encrypted\",\"target\":[\"preview\"],\"gitBranch\":\"$PR_GIT_BRANCH\"}" \
            "$VERCEL_ENV_CREATE_URL" > /dev/null

          VERCEL_ENV_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "$VERCEL_ENV_LIST_URL" 2>/dev/null || echo "{}")
          ENV_ID=$(echo "$VERCEL_ENV_RESPONSE" \
            | jq -r '.envs[] | select(.key == "DIRECT_URL" and .gitBranch == env.PR_GIT_BRANCH) | .id' 2>/dev/null || echo "")
          if [ -n "$ENV_ID" ]; then
            curl -sf -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID?teamId=$VERCEL_ORG_ID" > /dev/null
          fi

          curl -sf -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"DIRECT_URL\",\"value\":\"$DIRECT_URL\",\"type\":\"encrypted\",\"target\":[\"preview\"],\"gitBranch\":\"$PR_GIT_BRANCH\"}" \
            "$VERCEL_ENV_CREATE_URL" > /dev/null
          echo "set-env OK: Vercel preview env vars updated for branch $PR_GIT_BRANCH"

      - name: Skip Vercel steps (missing secrets)
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets == 'true' && steps.vercel_secrets.outputs.has_vercel_secrets != 'true' }}
        run: echo "Skipping Vercel-related steps because Vercel secrets are not available."

      - name: Skip preview DB steps (missing Neon secrets)
        if: ${{ steps.neon_secrets.outputs.has_neon_secrets != 'true' }}
        run: echo "Skipping Neon preview DB setup because required Neon secrets are unavailable."
